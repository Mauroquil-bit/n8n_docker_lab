services:

  # Base de datos PostgreSQL
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - n8n-red
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # n8n: plataforma de automatización
  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      # Conexión a PostgreSQL
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres      # Nombre del servicio (DNS interno)
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      # Configuración general
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-America/Argentina/Buenos_Aires}
      TZ: ${GENERIC_TIMEZONE:-America/Argentina/Buenos_Aires}
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - n8n-red
    depends_on:
      postgres:
        condition: service_healthy   # Espera a que postgres esté listo

networks:
  n8n-red:
    driver: bridge

volumes:
  postgres_data:
  n8n_data:
